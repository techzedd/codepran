<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your PRAN EcoCore password" />
    <title>PRΛN EcoCore — Reset Password</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="/ecocore/assets/css/style.css">
</head>
<body>

    <!-- Split Layout -->
    <div class="split-screen">
        
        <!-- Left Side: Brand Panel -->
        <div class="brand-panel">
            <div class="brand-header">
                <a href="/ecocore/index.html" class="logo-white">PRΛN <span>EcoCore</span></a>
            </div>
            
            <div class="brand-content">
                <h1>Establish a<br>New Key.</h1>
                <p>Ensure your new password uses a complex combination of symbols, digits, and cases to safeguard your company's carbon accounting ledger.</p>
            </div>
            
            <div class="brand-footer">
                &copy; 2026 PRΛN Technologies Inc. &bull; Enterprise Compliance Standard
            </div>
        </div>
        
        <!-- Right Side: Reset Form -->
        <div class="form-panel">
            <div class="form-container">
                <div class="form-header">
                    <h2>Reset Password</h2>
                    <p>Cancel recovery? <a href="/ecocore/login/index.html">Access Console</a></p>
                </div>
                
                <form id="ecocore-reset-form">
                    
                    <div class="form-group">
                        <label for="reset-pass">New Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="reset-pass" class="form-control" placeholder="••••••••" required />
                            <i class="fa-solid fa-lock"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="reset-confirm">Confirm New Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="reset-confirm" class="form-control" placeholder="••••••••" required />
                            <i class="fa-solid fa-lock-open"></i>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="margin-top: 10px;">
                        Reset Password <i class="fa-solid fa-circle-check"></i>
                    </button>
                    
                </form>
            </div>
        </div>
        
    </div>

    <!-- Scripts -->
    <script src="/ecocore/assets/js/auth.js"></script>
</body>
</html>
