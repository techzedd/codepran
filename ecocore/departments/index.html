<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRΛN EcoCore — Departments</title>
    
    <!-- Typography & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="/ecocore/assets/css/style.css">
</head>
<body>

    <header id="app-header"></header>

    <div class="workspace-wrapper">
        <aside id="app-sidebar"></aside>

        <main class="workspace-content">
            
            <div class="page-header">
                <div class="page-title">
                    <h1>Organization Departments</h1>
                    <p>Map departments responsible for data ingestion, auditing, and asset reporting.</p>
                </div>
            </div>

            <!-- Table Card -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <div style="font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; color: var(--col-primary);">Departments Structure</div>
                    <button class="btn btn-primary" onclick="toggleAddDeptForm()" style="width: auto; padding: 10px 20px; font-size: 0.85rem;">
                        <i class="fa-solid fa-plus"></i> Add Department
                    </button>
                </div>

                <!-- Hidden Form: Add Department -->
                <div id="add-dept-form" style="display: none; background: rgba(22, 163, 74, 0.02); border: 1px solid rgba(22, 163, 74, 0.1); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 24px;">
                    <h4 style="font-family: var(--font-display); font-size: 1rem; color: var(--col-primary); margin-bottom: 14px; font-weight: 700;">Add Department Node</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                        <div class="form-group" style="margin-bottom:0;">
                            <label>Department Name</label>
                            <input type="text" id="new-dept-name" class="form-control" placeholder="e.g. Purchase & Logistics" style="padding-left:16px;" />
                        </div>
                        <div class="form-group" style="margin-bottom:0;">
                            <label>Department Head</label>
                            <input type="text" id="new-dept-head" class="form-control" placeholder="e.g. Arthur Pendragon" style="padding-left:16px;" />
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-primary" onclick="submitNewDept()" style="width: auto; padding: 10px 20px; font-size: 0.85rem;">Save Department</button>
                        <button class="btn btn-secondary" onclick="toggleAddDeptForm()" style="width: auto; padding: 10px 20px; font-size: 0.85rem;">Cancel</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Dept ID</th>
                                <th>Department Name</th>
                                <th>Department Head</th>
                                <th>Total Active Users</th>
                                <th>Status</th>
                                <th style="text-align: right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="depts-table-body">
                            <!-- Injected dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Scripts -->
    <script src="/ecocore/assets/js/workspace.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            loadDeptsData();
        });

        function loadDeptsData() {
            const stored = localStorage.getItem("ecocore_onboarding_data");
            if (!stored) return;

            const data = JSON.parse(stored);
            renderDepts(data.departments);
        }

        function renderDepts(departments) {
            const tbody = document.getElementById("depts-table-body");
            if (departments.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color: var(--text-muted);">No departments configured.</td></tr>`;
                return;
            }

            tbody.innerHTML = departments.map(d => {
                const status = d.status || "Operational";
                const totalUsers = d.users !== undefined ? d.users : 2;

                return `
                    <tr>
                        <td style="font-family: var(--font-display); font-weight: 700; color: var(--col-primary);">DEP-${d.id.toString().slice(-4)}</td>
                        <td style="font-weight: 700;">${d.name}</td>
                        <td>${d.head || 'Unassigned'}</td>
                        <td><span style="font-weight:600; color: var(--text-main);">${totalUsers} Members</span></td>
                        <td><span class="badge ${status === 'Operational' ? 'badge-success' : 'badge-warning'}">${status}</span></td>
                        <td style="text-align: right;">
                            <button class="btn btn-secondary" onclick="removeDept(${d.id})" style="width: auto; padding: 6px 10px; font-size: 0.8rem; color:#ef4444; border-color: rgba(239, 68, 68, 0.15);">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join("");
        }

        function toggleAddDeptForm() {
            const form = document.getElementById("add-dept-form");
            form.style.display = form.style.display === "none" ? "block" : "none";
        }

        function submitNewDept() {
            const name = document.getElementById("new-dept-name").value.trim();
            const head = document.getElementById("new-dept-head").value.trim();

            if (!name) {
                alert("Department Name is required.");
                return;
            }

            const stored = localStorage.getItem("ecocore_onboarding_data");
            if (!stored) return;

            const data = JSON.parse(stored);
            const newDept = {
                id: Date.now(),
                name,
                head: head || "Unassigned",
                users: 0,
                status: "Operational"
            };
            data.departments.push(newDept);
            localStorage.setItem("ecocore_onboarding_data", JSON.stringify(data));

            loadDeptsData();
            toggleAddDeptForm();

            document.getElementById("new-dept-name").value = "";
            document.getElementById("new-dept-head").value = "";
        }

        function removeDept(id) {
            const stored = localStorage.getItem("ecocore_onboarding_data");
            if (!stored) return;

            const data = JSON.parse(stored);
            data.departments = data.departments.filter(d => d.id !== id);
            localStorage.setItem("ecocore_onboarding_data", JSON.stringify(data));

            loadDeptsData();
        }
    </script>
</body>
</html>
